name: Run Incus KVM Tests

on:
  schedule:
    - cron: "30 5 * * 1"
  workflow_dispatch:

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v7
      - id: set-matrix
        run: |
          distros=(openeuler debian ubuntu fedora opensuse alpine archlinux centos almalinux rockylinux openwrt gentoo)
          matrix_json='{"include":['

          for arch in amd64 arm64; do
            runner="ubuntu-latest"
            [ "$arch" = "arm64" ] && runner="ubuntu-24.04-arm"

            for distro in "${distros[@]}"; do
              output=$(bash build_kvm_images.sh "$distro" false "$arch" | tail -n 1)
              for image in $output; do
                [ -n "$image" ] || continue
                matrix_json+="{\"image\":\"$image\",\"arch\":\"$arch\",\"runner\":\"$runner\"},"
              done
            done
          done

          matrix_json=${matrix_json%,}
          matrix_json+=']}'
          echo "matrix=$matrix_json" >> "$GITHUB_OUTPUT"

  test-single-kvm-image:
    needs: prepare-matrix
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v7
      - name: Setup Fresh Environment
        run: |
          sudo apt-get update -y
          sudo apt-get install -y unzip
          sudo sh -c 'export noninteractive=true; curl -sL https://raw.githubusercontent.com/oneclickvirt/incus/main/scripts/incus_install.sh -o incus_install.sh && chmod +x incus_install.sh && bash incus_install.sh >/dev/null 2>&1'
      - name: Test KVM Image
        run: |
          echo "жµ‹иЇ• KVM й•њеѓЏ: ${{ matrix.image }}"
          if sudo bash test.sh "${{ matrix.image }}"; then
            echo "KVM жµ‹иЇ•йЂљиї‡: ${{ matrix.image }}"
            echo "TEST_KVM_RESULT success=true image=${{ matrix.image }} arch=${{ matrix.arch }}"
          else
            echo "KVM жµ‹иЇ•е¤±иґҐ: ${{ matrix.image }}"
            echo "TEST_KVM_RESULT success=false image=${{ matrix.image }} arch=${{ matrix.arch }}"
          fi
